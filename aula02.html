<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
   <style>
        .navbar {
            background-color: black;
        }
        .logo { 
            color: white;
    }

    /* Estilo de lista de links */
    .nav-links{
        list-style: none;
        display: flex; /* Exibe horizontalmente o menu */
        gap: 20px;
        margin: o;
        padding: 0;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 20px;
    }

    /* Estilo do Botâo Hamburguer( escondido no desktop) */
    .hamburguer{
        display: none;
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
    }

    /* Responsividade */
    @media screen and (max-width: 768px) {
        .hamburguer{
            /* mostra o botâo hamburguer */
            display: block;
        }

        /* Eesconde a lista e muda o layout para a vertical */
        .nav-links {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 60px; /* altura da navbar */
            left: 0;
            width: 100%;
            background-color: #333;
            text-align: center;
            padding: 20px 0;
        }

        /* Classe que sera adicionada ao javascript para mostrar o menu */
        .nav-links.active {
            display: flex;
        }
    }

 </style>

</head>
<body>
    
    <nav class="navbar">
        <div class="logo">Meu site</div>
        <!-- Botão hamburguer responsividade -->
         <button class="hamburguer" id="hamburguer-btn">
            &#9776; <!-- Simbolo do icone menu -->
         </button>

         <!-- Lista de itens do menu -->
          <ul class="nav-links" id="nav-links">
            <li>
                <a href="#">inicio</a>
                <a href="#">inicio</a>
                <a href="#">inicio</a>
                <a href="#">inicio</a>
            </li>
          </ul>
    </nav>
</body>
</html>
